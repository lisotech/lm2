  <style>
    /* Reset and Base Global Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0b0f19;
      color: #ffffff;
      padding-bottom: 140px;
    }

    /* Navigation Bar Framework */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5%;
      background-color: #111827;
      border-bottom: 1px solid #1f2937;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #10b981;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 30px;
      align-items: center;
    }

    nav ul li a {
      color: #9ca3af;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    nav ul li a:hover,
    nav ul li a.active {
      color: #ffffff;
    }

    /* Hero Landing Showcase Jumbotron */
    .hero {
      background: linear-gradient(135deg, #111827 0%, #0b0f19 100%);
      padding: 60px 5%;
      text-align: center;
      border-bottom: 1px solid #1f2937;
    }

    .hero h1 {
      font-size: 42px;
      line-height: 1.2;
      margin-bottom: 15px;
    }

    .hero h1 span {
      color: #10b981;
    }

    .hero p {
      color: #9ca3af;
      font-size: 18px;
      margin-bottom: 35px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background-color: #1f2937;
      max-width: 600px;
      margin: 0 auto;
      border-radius: 50px;
      padding: 5px 20px;
      border: 1px solid #374151;
    }

    .search-bar i {
      color: #9ca3af;
      margin-right: 12px;
    }

    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
      font-size: 16px;
      padding: 10px 0;
    }

    /* Core View Containers layout */
    main {
      padding: 40px 5%;
    }

    .music-section h2 {
      font-size: 24px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .music-section h2 i {
      color: #10b981;
    }

    /* Locked 3-Column Component Grid Layer Matrix */
    .music-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 30px;
    }

    @media (max-width: 768px) {
      .music-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px) {
      .music-grid {
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }
    }

    /* Interactive Structural Album Cards UI */
    .artist-card {
      background-color: #111827;
      padding: 16px;
      border-radius: 12px;
      transition: transform 0.3s, background-color 0.3s;
      cursor: pointer;
      border: 1px solid #1f2937;
    }

    .artist-card:hover {
      transform: translateY(-5px);
      background-color: #1f2937;
    }

    .card-img {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 15px;
      background-color: #1f2937;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .play-overlay i {
      font-size: 36px;
      color: #10b981;
    }

    .artist-card:hover .play-overlay {
      opacity: 1;
    }

    .artist-card h3 {
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .artist-card p {
      color: #9ca3af;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Dynamic Album Playlist Layer Viewport Panel */
    .playlist-view {
      background-color: #111827;
      border-radius: 16px;
      padding: 30px;
      margin-top: 20px;
      border: 1px solid #1f2937;
    }

    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1f2937;
      padding-bottom: 20px;
      margin-bottom: 25px;
    }

    .artist-profile-summary {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .artist-profile-summary img {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid #10b981;
    }

    .close-playlist-btn {
      background-color: #1f2937;
      border: none;
      color: #ffffff;
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .close-playlist-btn:hover {
      background-color: #ef4444;
    }

    .album-block {
      margin-bottom: 30px;
      background: #0b0f19;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #1f2937;
    }

    .album-title-meta {
      font-size: 18px;
      color: #10b981;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Rows Architecture for Tracklist Layout Selection */
    .track-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid #111827;
    }

    .track-row:hover {
      background-color: #1f2937;
    }

    .track-row-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .track-idx {
      color: #6b7280;
      font-weight: bold;
      width: 20px;
    }

    /* Persistent Bottom Media Controller Overlay UI Rules */
    .audio-player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #111827;
      border-top: 1px solid #1f2937;
      padding: 20px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      visibility: hidden;
    }

    .player-info h4 {
      font-size: 16px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 250px;
    }

    .player-info p {
      color: #9ca3af;
      font-size: 13px;
    }

    .player-controls button {
      background-color: #10b981;
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      cursor: pointer;
      border: none;
    }
  </style>

    // Cache System Core Control Pointers
    const audio = document.getElementById('mainAudio');
    const player = document.getElementById('audioPlayer');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const playBtn = document.getElementById('playBtn');
    const artistsDisplayGrid = document.getElementById('artistsDisplayGrid');
    const playlistDisplayWrapper = document.getElementById('playlistDisplayWrapper');

    // Initializer Hook Bootstrapper 
    document.addEventListener("DOMContentLoaded", function() {
      renderRosterGrid();
    });

    // Grid Generator Roster Engine Layout Locked 3-Column Core Loop
    function renderRosterGrid() {
      artistsDisplayGrid.innerHTML = '';
      CORE_STORE.artists.forEach(artist => {
        let totalTracksCount = 0;
        artist.albums.forEach(alb => totalTracksCount += alb.tracks.length);
        const componentHTML = `
                    <div class="artist-card" onclick="revealPlaylistOverlay('${artist.id}')">
                        <div class="card-img">
                            <img src="${artist.avatar}" alt="${artist.name}" onerror="this.src='https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=300'">
                            <div class="play-overlay"><i class="fa-solid fa-list-ul"></i></div>
                        </div>
                        <h3>${artist.name}</h3>
                        <p>${artist.albums.length} Album(s) • ${totalTracksCount} Audio Tracks</p>
                    </div>
                `;
        artistsDisplayGrid.insertAdjacentHTML('beforeend', componentHTML);
      });
    }

    // Context Display Engine Layer For Selected Artist Playlists Switch Output Actions
    function revealPlaylistOverlay(artistId) {
      const artist = CORE_STORE.artists.find(a => a.id === artistId);
      if (!artist) return;
      let structuralAlbumsHTML = '';
      artist.albums.forEach(album => {
        let albumTrackRowsHTML = '';
        album.tracks.forEach((track, idx) => {
          albumTrackRowsHTML += `
                        <div class="track-row" onclick="streamTrack('${track.title.replace(/'/g, "\\'")}', '${artist.name.replace(/'/g, "\\'")}', '${track.src}')">
                            <div class="track-row-left">
                                <span class="track-idx">${idx + 1}</span>
                                <i class="fa-solid fa-play-circle" style="color:#10b981;"></i>
                                <span>${track.title}</span>
                            </div>
                            <span style="color:#6b7280; font-size:13px;">Stream MP3</span>
                        </div>
                    `;
        });
        structuralAlbumsHTML += `
                    <div class="album-block">
                        <div class="album-title-meta">
                            <i class="fa-solid fa-compact-disc"></i>
                            <strong>${album.title}</strong> 
                            <span style="font-size:12px; color:#6b7280;">(${album.releaseYear})</span>
                        </div>
                        <div class="tracks-list-container">${albumTrackRowsHTML}</div>
                    </div>
                `;
      });
      playlistDisplayWrapper.innerHTML = `
                <div class="playlist-view">
                    <div class="playlist-header">
                        <div class="artist-profile-summary">
                            <img src="${artist.avatar}" alt="${artist.name}" onerror="this.src='https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=300'">
                            <div>
                                <h2 style="margin-bottom:2px;">${artist.name}</h2>
                                <p style="color:#9ca3af; font-size:14px;">${artist.metaDescription}</p>
                            </div>
                        </div>
                        <button class="close-playlist-btn" onclick="hidePlaylistPanel()"><i class="fa-solid fa-xmark"></i> Close Playlist</button>
                    </div>
                    <div class="playlist-payload-albums">${structuralAlbumsHTML}</div>
                </div>
            `;
      playlistDisplayWrapper.style.display = 'block';
      playlistDisplayWrapper.scrollIntoView({
        behavior: 'smooth',
        block: 'start'
      });
    }

    function hidePlaylistPanel() {
      playlistDisplayWrapper.style.display = 'none';
    }

    function resetToHomeView() {
      hidePlaylistPanel();
      document.getElementById('globalSearchField').value = '';
      renderRosterGrid();
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    function scrollToCatalogSection() {
      document.getElementById('catalog-section').scrollIntoView({
        behavior: 'smooth'
      });
    }

    // Functional Audio Player Control Core Subsystems
    function streamTrack(title, artist, sourceURL) {
      player.style.visibility = 'visible';
      playerTitle.innerText = title;
      playerArtist.innerText = artist;
      audio.src = sourceURL;
      audio.play();
      playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    }

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
      } else {
        audio.pause();
        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      }
    }

    // Real-Time Query Filter Input Operations Pattern Matrix Lookups
    function filterGlobalTracks() {
      const currentQuery = document.getElementById('globalSearchField').value.toLowerCase().trim();
      if (!currentQuery) {
        renderRosterGrid();
        return;
      }
      artistsDisplayGrid.innerHTML = '';
      CORE_STORE.artists.forEach(artist => {
        let matchesSearch = artist.name.toLowerCase().includes(currentQuery);
        if (!matchesSearch) {
          artist.albums.forEach(al => {
            if (al.title.toLowerCase().includes(currentQuery)) matchesSearch = true;
            al.tracks.forEach(tr => {
              if (tr.title.toLowerCase().includes(currentQuery)) matchesSearch = true;
            });
          });
        }
        if (matchesSearch) {
          let totalTracksCount = 0;
          artist.albums.forEach(alb => totalTracksCount += alb.tracks.length);
          const componentHTML = `
                        <div class="artist-card" onclick="revealPlaylistOverlay('${artist.id}')">
                            <div class="card-img">
                                <img src="${artist.avatar}" alt="${artist.name}" onerror="this.src='https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=300'">
                                <div class="play-overlay"><i class="fa-solid fa-list-ul"></i></div>
                            </div>
                            <h3>${artist.name}</h3>
                            <p>${artist.albums.length} Album(s) • ${totalTracksCount} Audio Tracks</p>
                        </div>
                    `;
          artistsDisplayGrid.insertAdjacentHTML('beforeend', componentHTML);
        }
      });
    }

    // Key Combo Catch-Intercept Configuration Listener Actions Hooks (`Ctrl + U` / `Cmd + U`)
    window.addEventListener('keydown', function(ev) {
      if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === 'u') {
        ev.preventDefault();
        document.getElementById('admin-tag-uploader').click();
      }
    });

    // Dynamic Native Embedded Tag Reader Pipeline Construction Logic Engine
    function readMP3Tags(inputSource) {
      const uploadedTargetFile = inputSource.files[0];
      if (!uploadedTargetFile) return;
      const structuredAudioBlobURL = URL.createObjectURL(uploadedTargetFile);
      jsmediatags.read(uploadedTargetFile, {
        onSuccess: function(extractedPayload) {
          const id3Frames = extractedPayload.tags;
          const cleanTitle = id3Frames.title || uploadedTargetFile.name.replace(/\.[^/.]+$/, "");
          const targetArtistName = id3Frames.artist || "Admin Session Artist";
          const targetAlbumName = id3Frames.album || "Admin Sandbox Single";
          let convertedArtworkString = "https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=300";
          if (id3Frames.picture) {
            const { data, format } = id3Frames.picture;
            let binaryContentBuffer = "";
            for (let elementIdx = 0; elementIdx < data.length; elementIdx++) {
              binaryContentBuffer += String.fromCharCode(data[elementIdx]);
            }
            convertedArtworkString = `data:${format};base64,${window.btoa(binaryContentBuffer)}`;
          }
          let artistNode = CORE_STORE.artists.find(a => a.name.toLowerCase() === targetArtistName.toLowerCase());
          if (!artistNode) {
            artistNode = {
              id: targetArtistName.toLowerCase().replace(/[^a-z0-9]/g, "-"),
              name: targetArtistName,
              avatar: convertedArtworkString,
              metaDescription: "Dynamically uploaded administrator local file index profile.",
              albums: []
            };
            CORE_STORE.artists.push(artistNode);
          }
          let albumNode = artistNode.albums.find(al => al.title.toLowerCase() === targetAlbumName.toLowerCase());
          if (!albumNode) {
            albumNode = {
              title: targetAlbumName,
              releaseYear: "2026",
              tracks: []
            };
            artistNode.albums.push(albumNode);
          }
          albumNode.tracks.unshift({
            title: cleanTitle,
            src: structuredAudioBlobURL
          });
          renderRosterGrid();
          revealPlaylistOverlay(artistNode.id);
          alert(`"${cleanTitle}" added to state repository.`);
        },
        onError: function(errorLog) {
          alert("ID3 Tag structural read execution dropped. File parsing aborted.");
        }
      });
    }
  </script>
